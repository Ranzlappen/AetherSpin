name: Deploy to GitHub Pages

# Publishes a single combined GitHub Pages site:
#   /            → the playable web client (public demo access point)
#   /storybook/  → the component library (Storybook)
#
# A repository has only one Pages site, so the game demo and Storybook are built
# and deployed together here rather than from competing workflows. The frontend
# auto-runs on its in-browser mock RGS when no `rgsUrl`/`sessionID` query params
# are present (see frontend/src/core/rgsClient.ts), so the demo is fully
# self-contained — no backend, no secrets. Both builds emit relative asset paths
# (Vite `base: './'` for the game; Storybook 8 relative output), so each works
# unmodified under the Pages project subpath and under /storybook/.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege token scoped to what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Single in-flight Pages deployment; let a running one finish rather than
# cancelling (a half-published site is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build combined site (demo + Storybook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.5.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the web client (demo → site root)
        run: pnpm --filter @aetherspin/frontend build

      - name: Build Storybook (→ /storybook)
        run: pnpm --filter @aetherspin/frontend build-storybook

      - name: Assemble combined site
        run: |
          rm -rf site
          mkdir -p site/storybook
          cp -r frontend/dist/. site/
          cp -r frontend/storybook-static/. site/storybook/

      - name: Configure Pages
        # enablement provisions Pages (source = GitHub Actions) on first run so
        # no manual Settings step is needed; harmless on subsequent runs.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
