name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package Stake Engine bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.5.0

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Package for Stake Engine
        run: bash scripts/package-for-stake.sh novaforged

      - name: Locate bundle
        id: bundle
        run: echo "zip=$(ls dist-stake/*.zip | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: stake-bundle
          path: dist-stake/*.zip
          if-no-files-found: error

      - name: Attach bundle to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.zip }}
          fail_on_unmatched_files: true
