name: Storybook

on:
  push:
    branches: ['main']
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build & deploy Storybook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        run: pnpm --filter @aetherspin/frontend build-storybook
      - uses: actions/configure-pages@v5
        # Provision the Pages site on first run so the deploy doesn't fail with
        # "Get Pages site failed / Not Found" before Pages is enabled in settings.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/storybook-static
      - id: deploy
        uses: actions/deploy-pages@v4
