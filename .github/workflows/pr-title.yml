name: PR Title

# Squash merges of multi-commit PRs use the PR title as the commit subject, and
# release-please only rolls up Conventional-Commit subjects into the changelog.
# Enforcing a conventional PR title keeps releases rich (the v1.2.0 changelog was
# terse precisely because a stacked PR's title wasn't conventional).
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed Conventional-Commit types (release-please bumps on feat/fix).
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title subject must start lower-case, e.g.
            "feat(engine): add cluster mechanic".
