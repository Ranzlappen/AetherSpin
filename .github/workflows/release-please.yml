name: Release Please

on:
  push:
    branches: ['main']

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR that rolls up Conventional Commits into the
      # CHANGELOG and, when merged, tags a release. "simple" tracks the repo as a
      # single versioned unit (per-game math versions live in their definitions).
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
