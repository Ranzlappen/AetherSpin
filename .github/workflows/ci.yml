name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python math engine: unit tests, contract/definition validation, RTP gate,
  # and generated-book integrity (standalone simulator, stdlib only).
  # ---------------------------------------------------------------------------
  math:
    name: Math (tests + contracts + RTP gate)
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: '0' # reproducible seeding (see math/simulator/runner.py)
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # The standalone simulator is stdlib-only; we only add pytest for CI.
          cache: pip

      - name: Install test dependencies
        run: pip install pytest

      - name: Validate game definitions (semantic, all games)
        run: python scripts/validate_definitions.py

      - name: Run unit tests (engine + event contract)
        run: python -m pytest math/tests -q

      - name: Validate RTP — base + buy-bonus (gates the build)
        run: python math/scripts/validate_rtp.py --game novaforged --sims 150000 --tol 0.05 --mode all

      - name: Generate + validate a book library (integrity gate)
        run: |
          python math/scripts/generate_books.py --game novaforged --sims 5000
          python math/scripts/validate_books.py --game novaforged

  # ---------------------------------------------------------------------------
  # Structural JSON-Schema validation of all game definitions (ajv / Node).
  # ---------------------------------------------------------------------------
  contracts:
    name: Contracts (schema validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Validate every game-definition against the schema
        run: >
          npx --yes ajv-cli@5 validate
          -s shared/schemas/game-definition.schema.json
          $(for f in shared/games/*/game-definition.json; do echo -n " -d $f"; done)

  # ---------------------------------------------------------------------------
  # Frontend workspace: type-check, test, build.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (check + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.5.0

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm --filter @aetherspin/frontend run check

      - name: Test
        run: pnpm --filter @aetherspin/frontend test

      - name: Build
        run: pnpm --filter @aetherspin/frontend build

  # ---------------------------------------------------------------------------
  # Repo-wide lint: prettier (enforced) + eslint.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (prettier + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.5.0

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check (enforced)
        run: pnpm exec prettier --check "**/*.{ts,svelte,js,json,md}"

      - name: ESLint (non-blocking — pending flat-config migration for ESLint 10)
        # ESLint 10 requires flat config (eslint.config.js); the repo's .eslintrc.cjs
        # is not yet migrated, so this is intentionally non-blocking. Tracked in
        # docs/IMPROVEMENT-PLAN.md (Phase B). Prettier is the enforced style gate.
        run: pnpm exec eslint "shared/**/*.ts" "frontend/src/**/*.{ts,svelte}" || true
