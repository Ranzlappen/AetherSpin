name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python math engine: unit tests, contract/definition validation, RTP gate,
  # and generated-book integrity (standalone simulator, stdlib only).
  # ---------------------------------------------------------------------------
  math:
    name: Math (tests + contracts + RTP gate)
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: '0' # reproducible seeding (see math/simulator/runner.py)
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # The standalone simulator is stdlib-only; we only add pytest for CI.
          cache: pip

      - name: Install test dependencies
        run: pip install pytest pytest-cov hypothesis mypy

      - name: Validate game definitions (semantic, all games)
        run: python scripts/validate_definitions.py

      - name: Type-check the engine (mypy)
        working-directory: math
        run: python -m mypy

      - name: Run unit + property tests with coverage
        run: python -m pytest math/tests -q --cov=simulator --cov-report=term-missing --cov-fail-under=70

      - name: Validate RTP — base + buy-bonus (gates the build)
        run: |
          python math/scripts/validate_rtp.py --game novaforged --sims 150000 --tol 0.05 --mode all
          python math/scripts/validate_rtp.py --game cosmicways --sims 150000 --tol 0.05 --mode all

      - name: Generate + validate book libraries (integrity gate, both games)
        run: |
          python math/scripts/generate_books.py --game novaforged --sims 5000
          python math/scripts/validate_books.py --game novaforged
          python math/scripts/generate_books.py --game cosmicways --sims 5000
          python math/scripts/validate_books.py --game cosmicways

      - name: Golden-book corpus drift guard (math↔client parity fixtures)
        run: |
          python math/scripts/gen_golden_corpus.py
          git diff --exit-code shared/fixtures/books/ \
            || { echo "::error::golden-book corpus is out of sync with the engine. Run 'PYTHONHASHSEED=0 python3 math/scripts/gen_golden_corpus.py' and commit."; exit 1; }

      - name: Compile official-SDK game modules (syntax gate, every game)
        # The certified math-sdk isn't vendored in CI, but the per-game modules
        # must stay syntactically valid so they don't rot between SDK runs.
        run: python -m py_compile math/games/*/*.py

      - name: Packaging smoke — submission manifest + checksums + SBOM
        run: |
          bash scripts/package-for-stake.sh novaforged --math-only
          python3 - <<'PY'
          import json, pathlib
          b = pathlib.Path("dist-stake/novaforged")
          for f in ("submission-manifest.json", "SHA256SUMS", "sbom.cdx.json"):
              assert (b / f).is_file(), f"missing cert artifact: {f}"
          m = json.loads((b / "submission-manifest.json").read_text())
          assert m["gameId"] == "novaforged" and m["artifacts"], "bad manifest"
          assert m["provenance"].get("gitCommit"), "manifest missing gitCommit"
          s = json.loads((b / "sbom.cdx.json").read_text())
          assert s["bomFormat"] == "CycloneDX" and s["components"], "bad sbom"
          print(f"cert artifacts OK: {len(m['artifacts'])} files, {len(s['components'])} sbom components")
          PY

  # ---------------------------------------------------------------------------
  # Structural JSON-Schema validation of all game definitions (ajv / Node).
  # ---------------------------------------------------------------------------
  contracts:
    name: Contracts (schema validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate every game-definition against the schema
        run: >
          npx --yes ajv-cli@5 validate
          -s shared/schemas/game-definition.schema.json
          $(for f in shared/games/*/game-definition.json; do echo -n " -d $f"; done)

  # ---------------------------------------------------------------------------
  # Frontend workspace: type-check, test, build.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (check + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.5.0

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Schema → types drift guard (generated types must match the schema)
        run: |
          pnpm gen:types
          git diff --exit-code shared/src/types/game.generated.d.ts \
            || { echo "::error::shared/src/types/game.generated.d.ts is out of sync with the schema. Run 'pnpm gen:types' and commit."; exit 1; }

      - name: Type-check
        run: pnpm --filter @aetherspin/frontend run check

      - name: Test (with coverage thresholds)
        run: pnpm --filter @aetherspin/frontend run test:coverage

      - name: Build
        run: pnpm --filter @aetherspin/frontend build

      - name: Bundle-size budget
        run: node scripts/check-bundle-size.mjs

  # ---------------------------------------------------------------------------
  # Repo-wide lint: prettier (enforced) + eslint.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (prettier + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.5.0

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check (enforced)
        run: pnpm exec prettier --check "**/*.{ts,svelte,js,json,md}"

      - name: ESLint (enforced — flat config, eslint.config.mjs)
        run: pnpm exec eslint "shared/**/*.ts" "frontend/src/**/*.{ts,svelte}"
