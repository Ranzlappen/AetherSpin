# Runtime configuration for the official math-sdk pipeline (Stellar Clusters).
# Used by the refactored math-sdk run.py to control execution & simulation.

[execution]
num_threads = 10
rust_threads = 20
batching_size = 50000
compression = true
profiling = false

[simulation]
# Production-grade sample sizes for certification.
base = 1_000_000
bonus = 200_000

[pipeline]
run_sims = true
run_optimization = true
run_analysis = true
upload_data = false

[targets]
modes = ["base", "bonus"]
rtp = 0.965
wincap = 5000.0
